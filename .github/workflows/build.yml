name: Build Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'
      upload_release:
        description: 'Upload to GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  BINARY_NAME: ttsalert
  GO_VERSION: '1.21'

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" == "dev" ]]; then
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
        shell: bash

      - name: Build Linux amd64
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BINARY_NAME }}_linux_amd64 ./cmd
        shell: bash

      - name: Build Linux arm64
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BINARY_NAME }}_linux_arm64 ./cmd
        shell: bash

      - name: Build Windows amd64
        if: matrix.os == 'windows' && matrix.arch == 'amd64'
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" `
            -o ${{ env.BINARY_NAME }}_windows_amd64.exe ./cmd
        shell: pwsh

      - name: Build macOS amd64
        if: matrix.os == 'darwin' && matrix.arch == 'amd64'
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BINARY_NAME }}_darwin_amd64 ./cmd
        shell: bash

      - name: Build macOS arm64
        if: matrix.os == 'darwin' && matrix.arch == 'arm64'
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BINARY_NAME }}_darwin_arm64 ./cmd
        shell: bash

      - name: Create archive (Linux/macOS)
        if: matrix.os == 'linux' || matrix.os == 'darwin'
        run: |
          tar -czf ${{ env.BINARY_NAME }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
            ${{ env.BINARY_NAME }}_${{ matrix.os }}_${{ matrix.arch }}
          sha256sum ${{ env.BINARY_NAME }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
            > ${{ env.BINARY_NAME }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz.sha256
        shell: bash

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        run: |
          Compress-Archive -Path ${{ env.BINARY_NAME }}_windows_amd64.exe `
            -DestinationPath ${{ env.BINARY_NAME }}_windows_amd64.zip
          $hash = Get-FileHash ${{ env.BINARY_NAME }}_windows_amd64.zip -Algorithm SHA256
          $hash.Hash | Out-File -FilePath ${{ env.BINARY_NAME }}_windows_amd64.zip.sha256
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ env.BINARY_NAME }}_${{ matrix.os }}_${{ matrix.arch }}.*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: github.event.inputs.upload_release == 'true' && github.event.inputs.version != 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Prepare release files
        run: |
          cd ./dist
          for dir in */; do
            cd "$dir"
            mv *.tar.gz *.zip *.sha256 ../ 2>/dev/null || true
            cd ..
          done
          rm -rf ttsalert-*/
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: true
          prerelease: false
          files: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.sha256
          generate_release_notes: true
