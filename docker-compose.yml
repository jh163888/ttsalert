version: '3.8'

services:
  ttsalert:
    build: .
    container_name: ttsalert
    ports:
      - "8080:8080"
      - "5060:5060/udp"
    volumes:
      - ./config.yaml:/root/config.yaml
      - ./audio:/root/audio
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - alert-network

  zabbix:
    image: zabbix/zabbix-server-mysql:latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix
      MYSQL_DATABASE: zabbix
    ports:
      - "10051:10051"
    depends_on:
      - mysql
    networks:
      - alert-network

  mysql:
    image: mysql:8.0
    container_name: zabbix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - alert-network

volumes:
  mysql-data:

networks:
  alert-network:
    driver: bridge
